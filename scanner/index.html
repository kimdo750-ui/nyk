<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>출고 스캐너 — 뉴욕꼬맹이</title>
<style>
  :root {
    --blue: #1d4ed8; --blue-light: #eff6ff; --blue-border: #93c5fd;
    --green: #16a34a; --green-light: #f0fdf4;
    --red: #dc2626; --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f1f5f9; color: var(--text); min-height: 100vh; }

  .header { background: var(--blue); padding: 16px 18px 14px; }
  .header h1 { color: #fff; font-size: 16px; font-weight: 600; }
  .header p { color: #bfdbfe; font-size: 12px; margin-top: 2px; }

  .section { background: #fff; margin: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 12px 14px 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .box-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 0 12px 12px; }
  .box-btn { padding: 12px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: #f8fafc; font-size: 14px; font-weight: 500; color: var(--text-muted); text-align: center; cursor: pointer; transition: all 0.15s; }
  .box-btn.active { background: var(--blue-light); border-color: var(--blue-border); color: var(--blue); }
  .box-btn .cnt { font-size: 11px; font-weight: 400; display: block; margin-top: 3px; opacity: 0.7; }
  .add-box-btn { margin: 0 12px 12px; padding: 9px; border-radius: var(--radius-sm); border: 1.5px dashed var(--border); background: transparent; font-size: 12px; color: var(--text-muted); cursor: pointer; width: calc(100% - 24px); text-align: center; display: block; }

  .now-box { display: flex; align-items: center; justify-content: center; padding: 10px 14px; background: var(--blue); margin: 0 12px 10px; border-radius: var(--radius-sm); gap: 8px; }
  .now-box span { color: #fff; font-size: 14px; font-weight: 600; }
  .now-box .cnt-badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; }

  .cam-section { background: #fff; margin: 0 12px; border-radius: var(--radius) var(--radius) 0 0; border: 1px solid var(--border); border-bottom: none; overflow: hidden; }
  #interactive { position: relative; width: 100%; height: 220px; overflow: hidden; background: #0f172a; display: none; }
  #interactive video { width: 100%; height: 100%; object-fit: cover; }
  #interactive canvas.drawingBuffer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 82%; height: 56px; border: 2px solid #22c55e; border-radius: 6px; pointer-events: none; z-index: 10; }
  .scan-guide-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(34,197,94,0.6); transform: translateY(-50%); }
  .scan-guide-label { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); color: #22c55e; font-size: 11px; white-space: nowrap; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 10px; }
  .cam-placeholder { height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; gap: 10px; }
  .cam-placeholder p { color: #94a3b8; font-size: 13px; }
  .cam-start-btn { background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .cam-controls { display: none; text-align: center; padding: 8px; background: #0f172a; }
  .cam-toggle-btn { color: #fff; border: none; border-radius: 8px; padding: 7px 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--red); }

  .scan-status { padding: 9px 14px; font-size: 12px; text-align: center; font-weight: 500; display: none; word-break: break-all; }
  .scan-status.ok { display: block; background: var(--green-light); color: var(--green); }
  .scan-status.err { display: block; background: #fef2f2; color: var(--red); }
  .scan-status.sending { display: block; background: #fafafa; color: var(--text-muted); }

  .list-section { background: #fff; margin: 0 12px; border-radius: 0 0 var(--radius) var(--radius); border: 1px solid var(--border); border-top: none; margin-bottom: 80px; max-height: 400px; overflow-y: auto; }
  #scanList { max-height: 350px; overflow-y: auto; }
  .scan-empty { padding: 24px 14px; text-align: center; font-size: 13px; color: var(--text-muted); }
  .scan-row { display: flex; align-items: flex-start; padding: 12px 14px; border-bottom: 1px solid var(--border); gap: 8px; animation: fi 0.2s ease; }
  @keyframes fi { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
  .scan-row:last-child { border-bottom: none; }
  .box-tag { font-size: 10px; font-weight: 600; background: var(--blue-light); color: var(--blue); border-radius: 6px; padding: 2px 7px; white-space: nowrap; margin-top: 1px; }
  .scan-info { flex: 1; min-width: 0; }
  .scan-name { font-size: 13px; color: var(--text); line-height: 1.4; word-break: break-all; }
  .scan-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .scan-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .scan-qty { font-size: 13px; font-weight: 600; color: var(--text); }
  .del-btn { color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; background: #ef4444; border-radius: 6px; padding: 8px 12px; white-space: nowrap; border: none; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; flex-shrink: 0; margin-top: 5px; }
  .sync-dot.ok { background: var(--green); }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 12px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .btn-reset { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: transparent; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; }
  .btn-print { flex: 2; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--blue); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-print:disabled { background: #cbd5e1; }

  #printScreen { display: none; }
  .print-header { background: var(--blue); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .print-back-btn { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .print-header span { color: #fff; font-size: 16px; font-weight: 600; }
  .print-meta { padding: 10px 14px; font-size: 11px; color: var(--text-muted); background: #f8fafc; border-bottom: 1px solid var(--border); }
  .print-box-card { margin: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; background: #fff; }
  .print-box-head { background: var(--blue-light); padding: 10px 14px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--blue-border); }
  .print-box-head .title { font-size: 14px; font-weight: 600; color: var(--blue); }
  .print-box-head .total { font-size: 12px; color: var(--blue); opacity: 0.8; }
  .print-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; gap: 8px; }
  .print-item:last-child { border-bottom: none; }
  .print-item-info { flex: 1; }
  .print-item-name { font-size: 13px; color: var(--text); }
  .print-item-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .print-item-qty { font-weight: 600; color: var(--blue); white-space: nowrap; }
  .print-actions { padding: 12px; display: flex; gap: 8px; margin-bottom: 20px; }
  .btn-share { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--green); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-back2 { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: transparent; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; }
</style>
</head>
<body>

<!-- 스캔 화면 -->
<div id="scanScreen">
  <div class="header">
    <h1>📦 출고 스캐너</h1>
    <p>뉴욕꼬맹이 박스 포장 시스템</p>
  </div>

  <div class="section">
    <div class="section-title">박스 선택</div>
    <div class="box-grid" id="boxGrid"></div>
    <button class="add-box-btn" id="addBoxBtn">+ 박스 추가</button>
  </div>

  <div class="now-box">
    <span id="nowLabel">Box 1 스캔 중</span>
    <span class="cnt-badge" id="nowCnt">0개</span>
  </div>

  <div style="margin: 10px 12px; display: flex; gap: 8px;">
    <input type="text" id="testBarcode" placeholder="바코드 직접 입력" style="flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">
    <button id="testBtn" style="padding: 10px 16px; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">스캔</button>
  </div>

  <div class="cam-section">
    <div id="interactive">
      <div class="scan-guide">
        <div class="scan-guide-line"></div>
        <span class="scan-guide-label">바코드를 이 안에 맞춰주세요</span>
      </div>
    </div>
    <div class="cam-placeholder" id="camPlaceholder">
      <p>카메라로 바코드를 스캔하세요</p>
      <button class="cam-start-btn" id="camStartBtn">📷 카메라 시작</button>
    </div>
    <div class="cam-controls" id="camControls">
      <button class="cam-toggle-btn" id="camToggleBtn">⏸ 일시정지</button>
    </div>
    <div class="scan-status" id="scanStatus"></div>
  </div>

  <div class="list-section">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;">
      <span>스캔 목록</span>
      <span id="totalLabel" style="font-size:12px;color:var(--blue);font-weight:600;margin-right:14px;"></span>
    </div>
    <div id="scanList"><div class="scan-empty">스캔된 제품이 없습니다</div></div>
  </div>

  <div class="bottom-bar">
    <button class="btn-reset" id="resetBtn">초기화</button>
    <button class="btn-print" id="printBtn" disabled>공유/출력 →</button>
  </div>
</div>

<!-- 출력 화면 -->
<div id="printScreen">
  <div class="print-header">
    <button class="print-back-btn" id="backBtn">← 돌아가기</button>
    <span>박스별 출고 목록</span>
  </div>
  <div class="print-meta" id="printMeta"></div>
  <div id="printContent"></div>
  <div class="print-actions">
    <button class="btn-back2" id="backBtn2">← 스캔 계속</button>
    <button class="btn-share" id="shareBtn">📤 카톡/문자 공유</button>
  </div>
</div>

<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbxkpHL9ewh1YbQhxhQkcc83GTraVirBRuvXwPWxgYDRP6wx-yJFAdixhK07ZFq08N42/exec';
var BARCODE_LENGTH = 13;
var DEBOUNCE_MS = 300;  // 바코드 인식 속도 개선 (0.6초 → 0.3초)
var FRAME_SKIP = 1;

var currentBox = '';
var scanned = [];
var lastScan = '';
var boxCount = 5;
var scanResetTimer = null;
var cameraStarted = false;
var cameraPaused = false;
var frameCount = 0;

// ── 이벤트 바인딩 (onclick 대신 addEventListener 사용) ──
document.getElementById('addBoxBtn').addEventListener('click', function() {
  boxCount++;
  saveState();
  initBoxGrid();
});

document.getElementById('camStartBtn').addEventListener('click', startCamera);

document.getElementById('testBtn').addEventListener('click', function() {
  var barcode = document.getElementById('testBarcode').value.trim();
  if (!barcode) {
    alert('바코드를 입력해주세요');
    return;
  }
  lookupAndScan(barcode);
  document.getElementById('testBarcode').value = '';
});

document.getElementById('camToggleBtn').addEventListener('click', function() {
  var btn = document.getElementById('camToggleBtn');
  var video = document.querySelector('#interactive video');
  if (cameraPaused) {
    if (video) video.play();
    cameraPaused = false;
    btn.textContent = '⏸ 일시정지';
    btn.style.background = '#ef4444';
  } else {
    if (video) video.pause();
    cameraPaused = true;
    btn.textContent = '▶ 재개';
    btn.style.background = '#16a34a';
  }
});

document.getElementById('resetBtn').addEventListener('click', function() {
  if (scanned.length === 0) return;
  if (!confirm('모든 스캔 데이터를 초기화하고 구글시트도 삭제할까요?')) return;

  // 구글시트에서 전체 삭제
  scanned.forEach(function(item) {
    fetch(SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', barcode: item.barcode, box: item.box })
    }).catch(function(){});
  });

  scanned = [];
  currentBox = '';
  boxCount = 5;
  saveState();
  renderList();
  initBoxGrid();
  updateNowCnt();
});

document.getElementById('printBtn').addEventListener('click', showPrint);
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('backBtn2').addEventListener('click', goBack);
document.getElementById('shareBtn').addEventListener('click', shareText);

// ── localStorage ──
function saveState() {
  try {
    localStorage.setItem('nyk_scanned', JSON.stringify(scanned));
    localStorage.setItem('nyk_box', String(currentBox));
    localStorage.setItem('nyk_boxcount', String(boxCount));
  } catch(e) {}
}

function loadState() {
  try {
    var s = localStorage.getItem('nyk_scanned');
    var b = localStorage.getItem('nyk_box');
    var bc = localStorage.getItem('nyk_boxcount');
    if (s) scanned = JSON.parse(s);
    if (b) currentBox = b;
    if (bc) boxCount = Math.min(5, Math.max(5, parseInt(bc)));
  } catch(e) {}
  if (!currentBox) currentBox = 'Box 1';
}

// ── 바코드 파싱 ──
function parseBarcode(raw) {
  raw = raw.trim();
  var parts = raw.split('/');
  if (parts.length >= 2) {
    var first = parts[0].trim();
    var sp = first.indexOf(' ');
    var sku = sp > -1 ? first.substring(0, sp) : first;
    var name = sp > -1 ? first.substring(sp + 1) : first;
    var size = parts[parts.length - 1].trim();
    if (parts.length > 2) name += ' ' + parts.slice(1, parts.length - 1).join('/');
    return { sku: sku, name: name, size: size, raw: raw };
  }
  var sp = raw.indexOf(' ');
  if (sp > -1) return { sku: raw.substring(0, sp), name: raw.substring(sp+1), size: '', raw: raw };
  return { sku: raw, name: raw, size: '', raw: raw };
}

function isValid(code) {
  if (!code) return false;
  code = code.trim();
  return /^R.{12}$/.test(code);
}

// ── 카메라 (ZXing) ──
var codeReader = null;

function startCamera() {
  if (cameraStarted) return;
  document.getElementById('camPlaceholder').style.display = 'none';
  document.getElementById('interactive').style.display = 'block';

  try {
    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.CODABAR,
      ZXing.BarcodeFormat.CODE_93
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    hints.set(ZXing.DecodeHintType.PURE_BARCODE, false);
    hints.set(ZXing.DecodeHintType.ASSUME_CODE_39, true);
    hints.set(ZXing.DecodeHintType.ALLOW_EAN_EXTENSIONS, true);

    codeReader = new ZXing.BrowserMultiFormatReader(hints);
    codeReader.decodeFromConstraints(
      { video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 360 }, frameRate: { ideal: 30, max: 30 } } },
      document.querySelector('#interactive video') || createVideo(),
      function(result, err) {
        frameCount++;
        if (FRAME_SKIP > 1 && frameCount % FRAME_SKIP !== 0) return;
        if (!result) return;
        var code = result.getText();
        if (!code) return;
        if (!isValid(code)) return;
        if (code === lastScan) return;

        lastScan = code;
        beep();
        if (navigator.vibrate) navigator.vibrate(100);

        lookupAndScan(code);

        clearTimeout(scanResetTimer);
        scanResetTimer = setTimeout(function() {
          lastScan = '';
        }, DEBOUNCE_MS);
      }
    );
    cameraStarted = true;
    document.getElementById('camControls').style.display = 'block';
  } catch(e) {
    document.getElementById('camPlaceholder').style.display = 'flex';
    document.getElementById('interactive').style.display = 'none';
    alert('카메라 권한을 허용해주세요.\n' + e);
  }
}

function createVideo() {
  var v = document.createElement('video');
  v.style.width = '100%';
  v.style.height = '100%';
  v.style.objectFit = 'cover';
  document.getElementById('interactive').appendChild(v);
  return v;
}

// ── 비프음 (저→고 두 음) ──
function beep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 첫번째 음
    var o1 = ctx.createOscillator();
    var g1 = ctx.createGain();
    o1.connect(g1); g1.connect(ctx.destination);
    o1.type = 'square';
    o1.frequency.value = 880;
    g1.gain.setValueAtTime(0.6, ctx.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o1.start(ctx.currentTime);
    o1.stop(ctx.currentTime + 0.15);
    // 두번째 음
    var o2 = ctx.createOscillator();
    var g2 = ctx.createGain();
    o2.connect(g2); g2.connect(ctx.destination);
    o2.type = 'square';
    o2.frequency.value = 1760;
    g2.gain.setValueAtTime(0.6, ctx.currentTime + 0.18);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
    o2.start(ctx.currentTime + 0.18);
    o2.stop(ctx.currentTime + 0.38);
  } catch(e) {}
}

// ── SKU마스터 조회 + 저장 ──
function lookupAndScan(barcode) {
  setStatus('sending', '조회 중...');
  fetch(SHEET_URL + '?action=lookup&barcode=' + encodeURIComponent(barcode))
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data.ok) {
        setStatus('err', '❌ 바코드 없음: ' + barcode);
        return;
      }

      var warehouse = data.warehouse || '';
      var name = data.name || '';
      var orderQty = data.orderQty || 0;

      // 로컬 기록
      var qty = addItem({ barcode: barcode, warehouse: warehouse, name: name, orderQty: orderQty, box: currentBox });

      // 구글시트 저장
      sendToSheet({ barcode: barcode, warehouse: warehouse, name: name, orderQty: orderQty, box: currentBox, scannedQty: qty });
    })
    .catch(function(err) {
      setStatus('err', '⚠ 조회 실패 — 와이파이 확인');
    });
}

// ── 로컬 스캔 목록에 추가 ──
function addItem(data) {
  var existing = scanned.find(function(s){
    return String(s.box).trim() === String(data.box).trim() &&
           String(s.barcode).trim() === String(data.barcode).trim();
  });
  if (existing) {
    existing.qty++;
  } else {
    scanned.push({
      barcode: data.barcode,
      warehouse: data.warehouse,
      name: data.name,
      orderQty: data.orderQty,
      box: data.box,
      qty: 1
    });
  }
  saveState();
  renderList();
  updateNowCnt();
  setStatus('ok', '✓ ' + data.barcode + ' — ' + data.box);
  var item = scanned.find(function(s){
    return String(s.box).trim() === String(data.box).trim() &&
           String(s.barcode).trim() === String(data.barcode).trim();
  });
  return item ? item.qty : 1;
}

// ── 구글시트에 저장 ──
function sendToSheet(data) {
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      barcode: data.barcode,
      warehouse: data.warehouse,
      name: data.name,
      orderQty: data.orderQty,
      box: data.box,
      scannedQty: data.scannedQty
    })
  }).then(function(res) {
    setStatus('ok', '✓ 저장 완료');
  }).catch(function(err) {
    setStatus('err', '⚠ 전송 실패: ' + err.message);
  });
}

// ── 삭제 ──
function delItem(idx) {
  var item = scanned[idx];
  if (!item) return;
  fetch(SHEET_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'delete', barcode: item.barcode, box: item.box })
  }).catch(function(){});
  if (item.qty > 1) item.qty--;
  else scanned.splice(idx, 1);
  saveState();
  renderList();
  updateNowCnt();
}

// ── UI ──
function setStatus(type, msg) {
  var el = document.getElementById('scanStatus');
  el.className = 'scan-status ' + type;
  el.textContent = msg;
  clearTimeout(el._t);
  if (type !== 'sending') el._t = setTimeout(function(){ el.className = 'scan-status'; }, 3000);
}

function initBoxGrid() {
  var grid = document.getElementById('boxGrid');
  var html = '';

  for (var i = 1; i <= boxCount; i++) {
    var boxName = 'Box ' + i;
    var isActive = (boxName === currentBox) ? 'active' : '';
    var cnt = scanned.filter(function(s){ return s.box === boxName; }).reduce(function(a,s){ return a+s.qty; }, 0);
    html += '<button class="box-btn ' + isActive + '" data-box="' + boxName + '">' + boxName + '<span class="cnt">' + cnt + '개</span></button>';
  }

  grid.innerHTML = html;

  grid.querySelectorAll('.box-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentBox = this.getAttribute('data-box');
      saveState();
      initBoxGrid();
      renderList();
      updateNowCnt();
    });
  });
}

function updateNowCnt() {
  var cnt = scanned.filter(function(s){ return s.box === currentBox; }).reduce(function(a,s){ return a+s.qty; }, 0);
  document.getElementById('nowCnt').textContent = cnt + '개';
  document.getElementById('nowLabel').textContent = (currentBox || 'Box') + ' 스캔 중';
}

function renderList() {
  var list = document.getElementById('scanList');
  var currentItems = scanned.filter(function(s){ return s.box === currentBox; });
  var total = scanned.reduce(function(a,s){ return a+s.qty; }, 0);

  document.getElementById('totalLabel').textContent = total > 0 ? '총 '+total+'개' : '';
  document.getElementById('printBtn').disabled = total === 0;

  if (currentItems.length === 0) {
    list.innerHTML = '<div class="scan-empty">스캔된 제품이 없습니다</div>';
    return;
  }

  var html = '';
  currentItems.slice().reverse().forEach(function(s, ri) {
    var realIdx = scanned.indexOf(s);
    html += '<div class="scan-row">' +
      '<span class="box-tag">' + s.warehouse + '</span>' +
      '<div class="scan-info"><div class="scan-name">' + s.name + '</div>' +
      '<div class="scan-sub">발주: ' + s.orderQty + '개</div></div>' +
      '<div class="scan-right"><span class="scan-qty">×' + s.qty + '</span>' +
      '<button class="del-btn" data-idx="' + realIdx + '">삭제</button></div></div>';
  });
  list.innerHTML = html;

  list.querySelectorAll('.del-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      delItem(parseInt(this.getAttribute('data-idx')));
    });
  });
}

function showPrint() {
  var html = '';
  var items = scanned.filter(function(s){ return s.box === currentBox; });
  var total = items.reduce(function(a,s){ return a+s.qty; }, 0);

  html += '<div class="print-box-card"><div class="print-box-head"><span class="title">📦 ' + currentBox + '</span><span class="total">총 ' + total + '개</span></div>';
  items.forEach(function(s) {
    html += '<div class="print-item"><div class="print-item-info"><div class="print-item-name">' + s.name + '</div><div class="print-item-sub">' + s.warehouse + ' | 발주: ' + s.orderQty + '개</div></div><span class="print-item-qty">×' + s.qty + '</span></div>';
  });
  html += '</div>';

  document.getElementById('printContent').innerHTML = html;
  var now = new Date();
  document.getElementById('printMeta').textContent = '출고일: ' + now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0') + '  ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('scanScreen').style.display = 'none';
  document.getElementById('printScreen').style.display = 'block';
}

function shareText() {
  var items = scanned.filter(function(s){ return s.box === currentBox; });
  var total = items.reduce(function(a,s){ return a+s.qty; }, 0);
  var now = new Date();
  var text = '[뉴욕꼬맹이 출고목록]\n' + now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0') + '\n\n';
  text += '📦 ' + currentBox + ' (총 ' + total + '개)\n';
  items.forEach(function(s) {
    text += '  · ' + s.name + ' (' + s.warehouse + ') ×' + s.qty + '\n';
  });
  if (navigator.share) {
    navigator.share({ title: '뉴욕꼬맹이 출고목록', text: text }).catch(function(){});
  } else {
    navigator.clipboard.writeText(text).then(function() {
      alert('클립보드에 복사됐어요!\n카카오톡에 붙여넣기 하세요.');
    }).catch(function() { alert(text); });
  }
}

function goBack() {
  document.getElementById('scanScreen').style.display = 'block';
  document.getElementById('printScreen').style.display = 'none';
}

// ── 초기 실행 ──
loadState();
if (!currentBox) currentBox = 'Box 1';
initBoxGrid();
updateNowCnt();
renderList();
</script>
</body>
</html>
