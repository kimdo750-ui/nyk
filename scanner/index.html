<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>출고 스캐너 — 뉴욕꼬맹이</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --blue: #1d4ed8; --blue-light: #eff6ff; --blue-border: #93c5fd;
    --green: #16a34a; --green-light: #f0fdf4;
    --red: #dc2626; --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f1f5f9; color: var(--text); min-height: 100vh; }

  .header { background: var(--blue); padding: 16px 18px 14px; }
  .header h1 { color: #fff; font-size: 16px; font-weight: 600; }
  .header p { color: #bfdbfe; font-size: 12px; margin-top: 2px; }

  .section { background: #fff; margin: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); padding: 12px 14px 8px; letter-spacing: 0.5px; text-transform: uppercase; }

  .box-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 0 12px 12px; }
  .box-btn { padding: 12px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: #f8fafc; font-size: 14px; font-weight: 500; color: var(--text-muted); text-align: center; cursor: pointer; transition: all 0.15s; }
  .box-btn.active { background: var(--blue-light); border-color: var(--blue-border); color: var(--blue); }
  .box-btn .cnt { font-size: 11px; font-weight: 400; display: block; margin-top: 3px; opacity: 0.7; }
  .add-box-btn { margin: 0 12px 12px; padding: 9px; border-radius: var(--radius-sm); border: 1.5px dashed var(--border); background: transparent; font-size: 12px; color: var(--text-muted); cursor: pointer; width: calc(100% - 24px); text-align: center; }

  .now-box { display: flex; align-items: center; justify-content: center; padding: 10px 14px; background: var(--blue); margin: 0 12px 10px; border-radius: var(--radius-sm); gap: 8px; }
  .now-box span { color: #fff; font-size: 14px; font-weight: 600; }
  .now-box .cnt-badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; }

  .cam-section { background: #fff; margin: 0 12px; border-radius: var(--radius) var(--radius) 0 0; border: 1px solid var(--border); border-bottom: none; overflow: hidden; }
  #reader { width: 100%; display: none; }
  #reader video { width: 100% !important; }
  .cam-placeholder { height: 190px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; gap: 10px; }
  .cam-placeholder p { color: #94a3b8; font-size: 13px; }
  .cam-placeholder button { background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; }

  .scan-status { padding: 9px 14px; font-size: 13px; text-align: center; font-weight: 500; display: none; }
  .scan-status.ok { display: block; background: var(--green-light); color: var(--green); }
  .scan-status.err { display: block; background: #fef2f2; color: var(--red); }
  .scan-status.sending { display: block; background: #fafafa; color: var(--text-muted); }

  .list-section { background: #fff; margin: 0 12px; border-radius: 0 0 var(--radius) var(--radius); border: 1px solid var(--border); border-top: none; margin-bottom: 80px; }
  .scan-empty { padding: 24px 14px; text-align: center; font-size: 13px; color: var(--text-muted); }
  .scan-row { display: flex; align-items: flex-start; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 8px; animation: fi 0.2s ease; }
  @keyframes fi { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
  .scan-row:last-child { border-bottom: none; }
  .box-tag { font-size: 10px; font-weight: 600; background: var(--blue-light); color: var(--blue); border-radius: 6px; padding: 2px 7px; white-space: nowrap; margin-top: 1px; }
  .scan-info { flex: 1; }
  .scan-name { font-size: 13px; color: var(--text); line-height: 1.4; }
  .scan-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .scan-right { display: flex; align-items: center; gap: 8px; }
  .scan-qty { font-size: 13px; font-weight: 600; color: var(--text); }
  .del-btn { color: #cbd5e1; font-size: 18px; cursor: pointer; line-height: 1; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; flex-shrink: 0; margin-top: 5px; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.err { background: var(--red); }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 12px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .btn-reset { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: transparent; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; }
  .btn-print { flex: 2; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--blue); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-print:disabled { background: #cbd5e1; }

  #printScreen { display: none; }
  .print-header { background: var(--blue); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .print-header button { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .print-header span { color: #fff; font-size: 16px; font-weight: 600; }
  .print-meta { padding: 10px 14px; font-size: 11px; color: var(--text-muted); background: #f8fafc; border-bottom: 1px solid var(--border); }
  .print-box-card { margin: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; background: #fff; }
  .print-box-head { background: var(--blue-light); padding: 10px 14px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--blue-border); }
  .print-box-head .title { font-size: 14px; font-weight: 600; color: var(--blue); }
  .print-box-head .total { font-size: 12px; color: var(--blue); opacity: 0.8; }
  .print-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; gap: 8px; }
  .print-item:last-child { border-bottom: none; }
  .print-item-info { flex: 1; }
  .print-item-name { font-size: 13px; color: var(--text); }
  .print-item-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .print-item-qty { font-weight: 600; color: var(--blue); white-space: nowrap; }
  .print-actions { padding: 12px; display: flex; gap: 8px; margin-bottom: 20px; }
  .btn-dprint { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--green); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-back2 { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: transparent; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; }

  @media print {
    .print-actions, .print-header button { display: none !important; }
    .print-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-box-head { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-box-card { break-inside: avoid; }
    #scanScreen { display: none !important; }
    body { background: #fff; }
  }
</style>
</head>
<body>

<div id="scanScreen">
  <div class="header">
    <h1>📦 출고 스캐너</h1>
    <p>뉴욕꼬맹이 박스 포장 시스템</p>
  </div>

  <div class="section">
    <div class="section-title">박스 선택</div>
    <div class="box-grid" id="boxGrid"></div>
    <button class="add-box-btn" onclick="addBox()">+ 박스 추가</button>
  </div>

  <div class="now-box">
    <span id="nowLabel">Box 1 스캔 중</span>
    <span class="cnt-badge" id="nowCnt">0개</span>
  </div>

  <div class="cam-section">
    <div id="reader"></div>
    <div class="cam-placeholder" id="camPlaceholder">
      <p>카메라로 바코드를 스캔하세요</p>
      <button onclick="startCamera()">📷 카메라 시작</button>
    </div>
    <div class="scan-status" id="scanStatus"></div>
  </div>

  <div class="list-section">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;">
      <span>스캔 목록</span>
      <span id="totalLabel" style="font-size:12px;color:var(--blue);font-weight:600;margin-right:14px;"></span>
    </div>
    <div id="scanList"><div class="scan-empty">스캔된 제품이 없습니다</div></div>
  </div>

  <div class="bottom-bar">
    <button class="btn-reset" onclick="resetAll()">초기화</button>
    <button class="btn-print" id="printBtn" onclick="showPrint()" disabled>출력 목록 보기 →</button>
  </div>
</div>

<div id="printScreen">
  <div class="print-header">
    <button onclick="goBack()">← 돌아가기</button>
    <span>박스별 출고 목록</span>
  </div>
  <div class="print-meta" id="printMeta"></div>
  <div id="printContent"></div>
  <div class="print-actions">
    <button class="btn-back2" onclick="goBack()">← 스캔 계속</button>
    <button class="btn-dprint" onclick="window.print()">🖨️ 인쇄하기</button>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzKY4X3IBuFm7WoyV30_mdgQPnH-got_8gcrciTCFAvTspt1LEzRNsrBdxSjlI4q18p/exec';

let currentBox = 1;
let boxCount = 4;
let scanned = [];
let scanner = null;
let lastScan = '';
let lastScanTime = 0;

function parseBarcode(raw) {
  raw = raw.trim();
  const parts = raw.split('/');
  if (parts.length >= 2) {
    const firstPart = parts[0].trim();
    const spaceIdx = firstPart.indexOf(' ');
    let sku = '', name = '';
    if (spaceIdx > -1) {
      sku = firstPart.substring(0, spaceIdx).trim();
      name = firstPart.substring(spaceIdx + 1).trim();
    } else {
      sku = firstPart; name = firstPart;
    }
    const lastPart = parts[parts.length - 1].trim();
    const size = lastPart;
    if (parts.length > 2) {
      const mid = parts.slice(1, parts.length - 1).join('/');
      if (mid) name = name + ' ' + mid;
    }
    return { sku, name, size, raw };
  }
  const spaceIdx = raw.indexOf(' ');
  if (spaceIdx > -1) {
    return { sku: raw.substring(0, spaceIdx), name: raw.substring(spaceIdx+1), size: '', raw };
  }
  return { sku: raw, name: raw, size: '', raw };
}

function initBoxGrid() {
  const grid = document.getElementById('boxGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= boxCount; i++) {
    const cnt = scanned.filter(s => s.box === i).reduce((a, s) => a + s.qty, 0);
    const btn = document.createElement('div');
    btn.className = 'box-btn' + (i === currentBox ? ' active' : '');
    btn.onclick = () => setBox(i);
    btn.innerHTML = '📦 Box ' + i + '<span class="cnt">' + (cnt > 0 ? cnt + '개' : '비어있음') + '</span>';
    grid.appendChild(btn);
  }
}

function addBox() { boxCount++; initBoxGrid(); }

function setBox(n) {
  currentBox = n;
  initBoxGrid();
  updateNowCnt();
  document.getElementById('nowLabel').textContent = 'Box ' + n + ' 스캔 중';
}

function startCamera() {
  document.getElementById('camPlaceholder').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 260, height: 100 } },
    onScan,
    () => {}
  ).catch(function(err) {
    document.getElementById('camPlaceholder').style.display = 'flex';
    document.getElementById('reader').style.display = 'none';
    alert('카메라 권한을 허용해주세요.\n' + err);
  });
}

function onScan(text) {
  const now = Date.now();
  if (text === lastScan && now - lastScanTime < 2500) return;
  lastScan = text;
  lastScanTime = now;
  if (navigator.vibrate) navigator.vibrate(80);
  const parsed = parseBarcode(text);
  addItem(parsed);
  sendToSheet(parsed);
}

function addItem(parsed) {
  const existing = scanned.find(function(s) { return s.box === currentBox && s.raw === parsed.raw; });
  if (existing) {
    existing.qty++;
    existing.synced = false;
  } else {
    scanned.push(Object.assign({}, parsed, { box: currentBox, qty: 1, synced: false }));
  }
  renderList();
  updateNowCnt();
  setStatus('ok', '✓ ' + parsed.sku + ' ' + parsed.name + (parsed.size ? ' / ' + parsed.size : '') + ' — Box ' + currentBox);
}

function sendToSheet(parsed) {
  const payload = {
    sku: parsed.sku,
    name: parsed.name,
    size: parsed.size,
    box: currentBox,
    qty: 1,
    raw: parsed.raw
  };
  setStatus('sending', '구글시트 전송 중...');
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function() {
    markSynced(parsed.raw);
    setStatus('ok', '✓ 구글시트 저장 완료');
  }).catch(function() {
    setStatus('err', '⚠ 전송 실패 — 와이파이 확인');
  });
}

function markSynced(raw) {
  const item = scanned.find(function(s) { return s.raw === raw && s.box === currentBox; });
  if (item) { item.synced = true; renderList(); }
}

function setStatus(type, msg) {
  const el = document.getElementById('scanStatus');
  el.className = 'scan-status ' + type;
  el.textContent = msg;
  clearTimeout(el._t);
  if (type !== 'sending') el._t = setTimeout(function() { el.className = 'scan-status'; }, 2500);
}

function renderList() {
  const list = document.getElementById('scanList');
  const total = scanned.reduce(function(a, s) { return a + s.qty; }, 0);
  document.getElementById('totalLabel').textContent = total > 0 ? '총 ' + total + '개' : '';
  document.getElementById('printBtn').disabled = total === 0;
  if (scanned.length === 0) {
    list.innerHTML = '<div class="scan-empty">스캔된 제품이 없습니다</div>';
    return;
  }
  list.innerHTML = scanned.slice().reverse().map(function(s, ri) {
    const realIdx = scanned.length - 1 - ri;
    return '<div class="scan-row">' +
      '<div class="sync-dot ' + (s.synced ? 'ok' : '') + '"></div>' +
      '<span class="box-tag">Box ' + s.box + '</span>' +
      '<div class="scan-info">' +
        '<div class="scan-name">' + s.sku + ' ' + s.name + '</div>' +
        (s.size ? '<div class="scan-sub">사이즈: ' + s.size + '</div>' : '') +
      '</div>' +
      '<div class="scan-right">' +
        '<span class="scan-qty">×' + s.qty + '</span>' +
        '<span class="del-btn" onclick="delItem(' + realIdx + ')">×</span>' +
      '</div>' +
    '</div>';
  }).join('');
  initBoxGrid();
}

function updateNowCnt() {
  const cnt = scanned.filter(function(s) { return s.box === currentBox; }).reduce(function(a, s) { return a + s.qty; }, 0);
  document.getElementById('nowCnt').textContent = cnt + '개';
}

function delItem(idx) {
  if (scanned[idx].qty > 1) scanned[idx].qty--;
  else scanned.splice(idx, 1);
  renderList();
  updateNowCnt();
}

function resetAll() {
  if (scanned.length === 0) return;
  if (!confirm('모든 스캔 데이터를 초기화할까요?')) return;
  scanned = []; boxCount = 4; currentBox = 1;
  renderList(); initBoxGrid(); updateNowCnt();
  document.getElementById('nowLabel').textContent = 'Box 1 스캔 중';
}

function showPrint() {
  const boxes = Array.from(new Set(scanned.map(function(s) { return s.box; }))).sort(function(a,b){return a-b;});
  let html = '';
  boxes.forEach(function(b) {
    const items = scanned.filter(function(s) { return s.box === b; });
    const total = items.reduce(function(a, s) { return a + s.qty; }, 0);
    html += '<div class="print-box-card"><div class="print-box-head"><span class="title">📦 Box ' + b + '</span><span class="total">총 ' + total + '개</span></div>';
    items.forEach(function(s) {
      html += '<div class="print-item"><div class="print-item-info"><div class="print-item-name">' + s.sku + ' ' + s.name + '</div>' + (s.size ? '<div class="print-item-sub">사이즈: ' + s.size + '</div>' : '') + '</div><span class="print-item-qty">×' + s.qty + '</span></div>';
    });
    html += '</div>';
  });
  document.getElementById('printContent').innerHTML = html;
  const now = new Date();
  document.getElementById('printMeta').textContent = '출고일: ' + now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0') + '  ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('scanScreen').style.display = 'none';
  document.getElementById('printScreen').style.display = 'block';
}

function goBack() {
  document.getElementById('scanScreen').style.display = 'block';
  document.getElementById('printScreen').style.display = 'none';
}

initBoxGrid();
</script>
</body>
</html>
