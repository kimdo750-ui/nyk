<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.6;
    }

    /* ═══ HEADER ═══ */
    header {
      background: #ffffff;
      border-bottom: 1px solid #e8e8e8;
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 30px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      text-decoration: none;
      white-space: nowrap;
    }

    .search-bar {
      flex: 1;
      max-width: 400px;
    }

    .search-bar input {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 14px;
    }

    .header-icons {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .header-icons a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .header-icons a:hover {
      color: #e74c3c;
    }

    /* ═══ CATEGORY NAV ═══ */
    .category-nav {
      background: #f9f9f9;
      border-bottom: 1px solid #e8e8e8;
      padding: 0;
    }

    .category-nav ul {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      list-style: none;
      gap: 0;
    }

    .category-nav li {
      flex: 1;
    }

    .category-nav a {
      display: block;
      padding: 15px 0;
      text-align: center;
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .category-nav a:hover {
      color: #e74c3c;
      border-bottom-color: #e74c3c;
    }

    .category-nav a.active {
      color: #e74c3c;
      border-bottom-color: #e74c3c;
    }

    /* ═══ CATEGORY HEADER ═══ */
    .category-header {
      background: #f5f5f5;
      padding: 30px 20px;
      border-bottom: 1px solid #e8e8e8;
    }

    .category-header-content {
      max-width: 1400px;
      margin: 0 auto;
    }

    .category-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .category-header p {
      font-size: 14px;
      color: #666;
    }

    /* ═══ FILTER & SORT ═══ */
    .filter-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid #e8e8e8;
    }

    .filter-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .filter-group label {
      font-size: 13px;
      color: #666;
      white-space: nowrap;
    }

    .filter-group select {
      padding: 8px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }

    .product-count {
      font-size: 13px;
      color: #999;
    }

    .sort-buttons {
      display: flex;
      gap: 8px;
    }

    .sort-btn {
      padding: 8px 16px;
      border: 1px solid #e0e0e0;
      background: white;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sort-btn:hover, .sort-btn.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    /* ═══ PRODUCTS SECTION ═══ */
    .products-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .product-card {
      background: white;
      transition: all 0.2s;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      margin-bottom: 12px;
      border-radius: 4px;
      overflow: hidden;
    }

    .product-info {
      padding: 0;
    }

    .product-category {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }

    .product-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
      line-height: 1.4;
      height: 28px;
      overflow: hidden;
    }

    .product-price {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .price-discount {
      color: #1a1a1a;
      font-weight: 700;
      font-size: 14px;
    }

    .price-original {
      color: #999;
      font-size: 13px;
      text-decoration: line-through;
    }

    .price-rate {
      background: #e74c3c;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 2px;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
    }

    .rating-star {
      color: #ffc107;
      font-size: 12px;
    }

    .rating-count {
      color: #999;
      font-size: 12px;
    }

    .product-button {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .product-button:hover {
      background: #e74c3c;
    }

    /* ═══ PAGINATION ═══ */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
    }

    .pagination a, .pagination span {
      padding: 8px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 13px;
    }

    .pagination a:hover {
      border-color: #1a1a1a;
      background: #f5f5f5;
    }

    .pagination .active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    /* ═══ FOOTER ═══ */
    footer {
      background: #f9f9f9;
      border-top: 1px solid #e8e8e8;
      padding: 40px 20px;
      margin-top: 60px;
    }

    .footer-content {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      margin-bottom: 30px;
    }

    .footer-section h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .footer-section a {
      display: block;
      font-size: 13px;
      color: #666;
      text-decoration: none;
      margin-bottom: 8px;
    }

    .footer-section a:hover {
      color: #e74c3c;
    }

    .footer-bottom {
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid #e8e8e8;
      font-size: 12px;
      color: #999;
    }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 1024px) {
      .products-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .filter-bar {
        flex-wrap: wrap;
      }
    }

    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .filter-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      .sort-buttons {
        width: 100%;
        justify-content: space-between;
      }

      .footer-content {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }

    @media (max-width: 480px) {
      .products-grid {
        grid-template-columns: 1fr;
      }

      .filter-bar {
        padding: 15px;
      }

      .footer-content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        { id: 'group_006', name: '커스텀 단체복', price: 15900, discount: 0, rating: 4.9, reviews: 112, image: '../imege/단체복/Gemini_Generated_Image_iilzmfiilzmfiilz.png' },
        { id: 'group_007', name: '단체 프리미엄 인쇄', price: 19900, discount: 0, rating: 4.7, reviews: 89, image: '../imege/단체복/Gemini_Generated_Image_e6frige6frige6fr.png' },
        { id: 'group_008', name: '단체 빠른배송', price: 17900, discount: 0, rating: 4.9, reviews: 76, image: '../imege/단체복/Gemini_Generated_Image_aj2mglaj2mglaj2m.png' }
      ]
    }
  };

  let currentCategory = 'kids';
  let currentPage = 1;
  const itemsPerPage = 8;
  let filteredProducts = [];

  function loadCategory() {
    const params = new URLSearchParams(window.location.search);
    currentCategory = params.get('cat') || 'kids';

    console.log('✅ 현재 카테고리:', currentCategory);
    console.log('🔗 URL 파라미터:', window.location.search);

    const categoryData = products[currentCategory];
    if (!categoryData) {
      console.error('❌ 카테고리 데이터 없음:', currentCategory);
      currentCategory = 'kids';
    }

    const categoryData2 = products[currentCategory];
    document.getElementById('categoryTitle').textContent = categoryData2.title;
    document.getElementById('categoryDesc').textContent = categoryData2.desc;
    document.getElementById('totalCount').textContent = categoryData2.items.length;

    filteredProducts = [...categoryData2.items];
    currentPage = 1;
    renderProducts();

    // 네비 활성화 (간단히 수정)
    document.querySelectorAll('.nav-link').forEach(link => {
      const href = link.getAttribute('href');
      if (href.includes('cat=' + currentCategory)) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
  }

  function renderProducts() {
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const displayProducts = filteredProducts.slice(start, end);

    const grid = document.getElementById('productsGrid');
    grid.innerHTML = displayProducts.map((product, mapIdx) => {
      const discountedPrice = Math.floor(product.price * (1 - product.discount / 100));
      const globalIdx = start + mapIdx;
      return `
        <div class="product-card" onclick="goToDetail('${product.id}', ${globalIdx})">
          ${product.image ? `<img src="${product.image}" alt="${product.name}" class="product-image" style="width: 100%; height: 100%; object-fit: cover;">` : `<div class="product-image">${product.emoji}</div>`}
          <div class="product-info">
            <div class="product-category">${products[currentCategory].title}</div>
            <div class="product-name">${product.name}</div>
            <div class="product-price">
              <span class="price-discount">${discountedPrice.toLocaleString()}원</span>
              ${product.discount > 0 ? `<span class="price-rate">${product.discount}%</span>` : ''}
              ${product.discount > 0 ? `<span class="price-original">${product.price.toLocaleString()}원</span>` : ''}
            </div>
            <div class="product-rating">
              <span class="rating-star">⭐ ${product.rating}</span>
              <span class="rating-count">(${product.reviews})</span>
            </div>
            <button class="product-button">보기</button>
          </div>
        </div>
      `;
    }).join('');

    renderPagination();
  }

  function renderPagination() {
    const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
    const pagination = document.getElementById('pagination');
    let html = '';

    if (currentPage > 1) {
      html += `<a href="#" onclick="goToPage(${currentPage - 1}); return false;">이전</a>`;
    }

    for (let i = 1; i <= totalPages; i++) {
      if (i === currentPage) {
        html += `<span class="active">${i}</span>`;
      } else {
        html += `<a href="#" onclick="goToPage(${i}); return false;">${i}</a>`;
      }
    }

    if (currentPage < totalPages) {
      html += `<a href="#" onclick="goToPage(${currentPage + 1}); return false;">다음</a>`;
    }

    pagination.innerHTML = html;
  }

  function goToPage(page) {
    currentPage = page;
    renderProducts();
    window.scrollTo(0, 0);
  }

  function sortProducts(type) {
    const categoryData = products[currentCategory];
    filteredProducts = [...categoryData.items];

    if (type === 'latest') {
      // 최신순 (기본)
    } else if (type === 'popular') {
      filteredProducts.sort((a, b) => b.reviews - a.reviews);
    } else if (type === 'lowprice') {
      filteredProducts.sort((a, b) => (a.price * (1 - a.discount/100)) - (b.price * (1 - b.discount/100)));
    } else if (type === 'highprice') {
      filteredProducts.sort((a, b) => (b.price * (1 - b.discount/100)) - (a.price * (1 - a.discount/100)));
    }

    // 버튼 활성화
    document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    currentPage = 1;
    renderProducts();
  }

  function goToDetail(id, idx) {
    window.location.href = `shop.html?cat=${currentCategory}&idx=${idx}`;
  }

  // 초기 로드
  loadCategory();
</script>

</body>
