<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 상세 - 우리이야기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.6;
    }

    /* ═══ HEADER ═══ */
    header {
      background: #ffffff;
      border-bottom: 1px solid #e8e8e8;
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 30px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      text-decoration: none;
    }

    .search-bar {
      flex: 1;
      max-width: 400px;
    }

    .search-bar input {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 14px;
    }

    .header-icons {
      display: flex;
      gap: 20px;
    }

    .header-icons a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .header-icons a:hover {
      color: #e74c3c;
    }

    /* ═══ CATEGORY NAV ═══ */
    .category-nav {
      background: #f9f9f9;
      border-bottom: 1px solid #e8e8e8;
    }

    .category-nav ul {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      list-style: none;
    }

    .category-nav li {
      flex: 1;
    }

    .category-nav a {
      display: block;
      padding: 15px 0;
      text-align: center;
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      border-bottom: 3px solid transparent;
    }

    .category-nav a:hover, .category-nav a.active {
      color: #e74c3c;
      border-bottom-color: #e74c3c;
    }

    /* ═══ PRODUCT DETAIL ═══ */
    .product-detail {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1;
      background: #f5f5f5;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: white;
    }

    .product-info {
      padding-top: 20px;
    }

    .product-category {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }

    .product-title {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e8e8e8;
    }

    .rating-star {
      color: #ffc107;
      font-size: 14px;
    }

    .rating-count {
      color: #999;
      font-size: 13px;
    }

    .product-price {
      margin-bottom: 20px;
    }

    .price-label {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }

    .price-value {
      font-size: 32px;
      font-weight: 700;
      color: #e74c3c;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .price-original {
      font-size: 18px;
      color: #999;
      text-decoration: line-through;
      font-weight: 400;
    }

    /* ═══ OPTIONS ═══ */
    .options {
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid #e8e8e8;
    }

    .option-group {
      margin-bottom: 16px;
    }

    .option-label {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
      display: block;
    }

    .option-select {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 14px;
      background: white;
      color: #1a1a1a;
      cursor: pointer;
    }

    .option-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .option-btn {
      padding: 10px;
      border: 1px solid #e0e0e0;
      background: white;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option-btn:hover {
      border-color: #1a1a1a;
    }

    .option-btn.selected {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    /* ═══ CUSTOMIZATION ═══ */
    .customization {
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid #e8e8e8;
    }

    .customization h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      display: block;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a1a;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* ═══ BUTTONS ═══ */
    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #e74c3c;
      color: white;
    }

    .btn-primary:hover {
      background: #c0392b;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #1a1a1a;
      border: 1px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    /* ═══ PREVIEW ═══ */
    .preview-section {
      background: #f9f9f9;
      padding: 40px 20px;
      margin-top: 40px;
    }

    .preview-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .preview-container h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .preview-box {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 40px;
      text-align: center;
    }

    .preview-tshirts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 20px;
    }

    .preview-tshirt-section {
      text-align: center;
    }

    .preview-tshirt-section h4 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .preview-tshirt {
      width: 150px;
      height: 180px;
      margin: 0 auto 16px;
      position: relative;
    }

    .preview-tshirt svg {
      width: 100%;
      height: 100%;
    }

    .preview-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      text-align: center;
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      word-break: keep-all;
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-info {
      font-size: 13px;
      color: #666;
      margin-top: 16px;
    }

    /* ═══ FOOTER ═══ */
    footer {
      background: #f9f9f9;
      border-top: 1px solid #e8e8e8;
      padding: 40px 20px;
      margin-top: 60px;
    }

    .footer-content {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      margin-bottom: 30px;
    }

    .footer-section h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .footer-section a {
      display: block;
      font-size: 13px;
      color: #666;
      text-decoration: none;
      margin-bottom: 8px;
    }

    .footer-section a:hover {
      color: #e74c3c;
    }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 768px) {
      .product-detail {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .product-title {
        font-size: 20px;
      }

      .price-value {
        font-size: 24px;
      }

      .option-buttons {
        grid-template-columns: repeat(2, 1fr);
      }

      .footer-content {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

        </div>
      </div>

      <div class="option-group">
        <label class="option-label">사이즈</label>
        <select class="option-select" id="sizeSelect">
          <option>사이즈 선택</option>

    </div>

      <!-- 폼이 JavaScript로 동적으로 로드됨 -->
    </div>

    <!-- 구매 버튼 -->
    <div class="actions">
      <button class="btn btn-primary" onclick="orderProduct()">주문하기</button>
      <button class="btn btn-secondary" onclick="addToCart()">장바구니</button>
    </div>
  </div>
</section>

<!-- ═══ PREVIEW SECTION ═══ -->
<section class="preview-section">

  function loadProduct() {
    // URL 파라미터에서 카테고리와 인덱스 읽기
    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'kids';
    const idx = parseInt(params.get('idx') || '0');

    currentCategory = cat; // 전역변수 설정

    console.log('✅ 카테고리:', cat, '인덱스:', idx);

    // 상품 데이터 가져오기
    const categoryData = products[cat];
    if (!categoryData || !categoryData.items[idx]) {
      console.error('❌ 상품을 찾을 수 없습니다');
      return;
    }

    const product = categoryData.items[idx];

    document.getElementById('productCategory').textContent = categoryData.title;
    document.getElementById('productTitle').textContent = product.name;

    if (product.image) {
      document.getElementById('productImage').innerHTML = `<img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">`;
    } else {
      document.getElementById('productImage').textContent = product.emoji;
    }

    document.getElementById('priceDiscount').textContent = Math.floor(product.price * (1 - product.discount / 100)).toLocaleString();

    if (product.discount > 0) {
      document.getElementById('priceOriginal').style.display = 'inline';
      document.getElementById('priceOriginal').textContent = product.price.toLocaleString() + '원';
    }

    // 커스터마이징 폼 로드 (카테고리별로 다름)
    const formType = cat; // 카테고리를 그대로 폼 타입으로 사용
    const formHtml = customizationForms[formType] || '';
    document.getElementById('customizationForm').innerHTML = '<h3>개인 정보 입력</h3>' + formHtml;

    // 네비 활성화
    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.href.includes('cat=' + cat)) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });

    // 사이즈 옵션 설정
    setSizeOptions();

    // 색상 초기화
    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));

  // 별자리 계산 함수

    { name: '염소자리', start: [12, 22], end: [1, 19] },
    { name: '물병자리', start: [1, 20], end: [2, 18] },

    { name: '쌍둥이자리', start: [5, 21], end: [6, 20] },
    { name: '게자리', start: [6, 21], end: [7, 22] },
    { name: '사자자리', start: [7, 23], end: [8, 22] },
    { name: '처녀자리', start: [8, 23], end: [9, 22] },

  ];

  function getConstellation(month, day) {
    if (!month || !day) return '';
    month = parseInt(month);
    day = parseInt(day);

    for (let c of CONSTELLATIONS) {
      const [sMonth, sDay] = c.start;
      const [eMonth, eDay] = c.end;

      if (sMonth === eMonth) {
        if (month === sMonth && day >= sDay && day <= eDay) return c.name;
      } else {
        if ((month === sMonth && day >= sDay) || (month === eMonth && day <= eDay)) {
          return c.name;
        }
      }
    }
    return '';
  }

  function selectOption(btn, type, value) {
    btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    if (type === 'color') {
      selectedColor = btn.dataset.color || '#ffffff';
      selectedTextColor = btn.dataset.textcolor || '#000000';
      updateTshirtColor();
    }
  }

  function selectConstellationStyle(btn, style) {
    btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedConstellationStyle = style;
    updatePreview();
  }

  function selectGroupType(btn, type) {
    btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedGroupType = type;

    // 해당 타입의 폼만 보이게
    document.getElementById('group-kindergarten').style.display = type === 'kindergarten' ? 'block' : 'none';
    document.getElementById('group-company').style.display = type === 'company' ? 'block' : 'none';
    document.getElementById('group-sports').style.display = type === 'sports' ? 'block' : 'none';

    updatePreview();
  }

  function selectGroupConstellationStyle(btn, style) {
    btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedGroupConstellationStyle = style;
    updatePreview();
  }

  function getConstellationFromDate(dateStr) {
    if (!dateStr) return null;
    const [year, month, day] = dateStr.split('-').map(Number);

    const constellations = [
      { name: 'aries', start: [3, 21], end: [4, 19] },
      { name: 'taurus', start: [4, 20], end: [5, 20] },
      { name: 'gemini', start: [5, 21], end: [6, 20] },
      { name: 'cancer', start: [6, 21], end: [7, 22] },
      { name: 'leo', start: [7, 23], end: [8, 22] },
      { name: 'virgo', start: [8, 23], end: [9, 22] },
      { name: 'libra', start: [9, 23], end: [10, 22] },
      { name: 'scorpio', start: [10, 23], end: [11, 21] },
      { name: 'sagittarius', start: [11, 22], end: [12, 21] },
      { name: 'capricorn', start: [12, 22], end: [1, 19] },
      { name: 'aquarius', start: [1, 20], end: [2, 18] },
      { name: 'pisces', start: [2, 19], end: [3, 20] }
    ];

    for (let c of constellations) {
      const [sMonth, sDay] = c.start;
      const [eMonth, eDay] = c.end;

      if (sMonth > eMonth) {
        // 예: 염소자리 (12월 22일 ~ 1월 19일)
        if ((month === sMonth && day >= sDay) || (month === eMonth && day <= eDay)) {
          return c.name;
        }
      } else {
        // 일반적인 경우
        if (month === sMonth && day >= sDay) return c.name;
        if (month === eMonth && day <= eDay) return c.name;
      }
    }
    return null;
  }

  function updateTshirtColor() {
    const svgs = document.querySelectorAll('.preview-tshirt svg path');
    svgs.forEach(svg => {
      svg.style.fill = selectedColor;
      svg.style.stroke = '#000000';
      svg.style.strokeWidth = '2';
    });

    const textEls = document.querySelectorAll('.preview-text');
    textEls.forEach(el => {
      el.style.color = selectedTextColor;
    });
  }

    sizes.forEach(size => {
      const opt = document.createElement('option');
      opt.value = size;
      opt.textContent = size;
      sizeSelect.appendChild(opt);
    });

          frontText = name;

        const backEl = document.getElementById('previewTextBack');

        const backEl = document.getElementById('previewTextBack');

        const frontEl = document.getElementById('previewTextFront');
        const backEl = document.getElementById('previewTextBack');
        if (frontEl) frontEl.textContent = frontText;
        if (backEl) backEl.textContent = backText;

          const quotes = CONSTELLATION_QUOTES[selectedConstellationStyle];
          backText = quotes[constellationKey] || '별자리 문구';

        frontText = name;

      const frontEl = document.getElementById('previewTextFront');
      const backEl = document.getElementById('previewTextBack');
      if (frontEl) frontEl.textContent = frontText;
      if (backEl) backEl.textContent = backText;
      return; // 여기서 return (아동복은 별도 처리)
    } else {
      // adults, senior, pet, group: 선택한 문구 표시
      const select = document.querySelector('.customization select');
      const inputs = document.querySelectorAll('.customization input');

      if (select && select.value) {
        previewText = select.value;
      } else if (inputs.length > 0) {
        const inputArray = Array.from(inputs).map(inp => inp.value).filter(v => v);
        previewText = inputArray[0] || '';
      }
    }

    const textEl = document.getElementById('previewText');
    if (textEl) {
      textEl.textContent = previewText || '정보를 입력하세요';
    }
